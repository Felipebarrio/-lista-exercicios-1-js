<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>-lista-exercicios-1-js</title>
</head>
<body>
       <h1>Conceitos básicos de Javascript</h1>
       <script>
        let numero01 = Number(prompt('Digite o primeiro número'))
        let numero02 = Number(prompt('Digite o segundo número'))
        let soma = numero01 + numero02
        let subtracao = numero01 - numero02
         let multiplicacao = numero01 * numero02
          let divisao = numero01 / numero02
          alert('soma: ' +soma +' subtração: ' +subtracao +' multiplicação: ' +multiplicacao +' divisão: ' +divisao)
       </script>

</body>
</html>
